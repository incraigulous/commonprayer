name: CI

on: [push, pull_request]

jobs:
  checks:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        node: ['18', '20', '22']

    name: Node ${{ matrix.node }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Lint CSS
        run: npm run lint:css

      - name: Tests
        run: npm run test

      - name: Build
        run: npm run build
