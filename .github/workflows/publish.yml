name: EAS Publish

# Trigger manually via GitHub Actions UI, or change to:
#   push:
#     branches: [main]
# once your App Store / Google Play credentials are configured.
on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ios
          - android
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: EAS Build & Submit
    runs-on: ubuntu-latest
    # Remove or change this condition once App Store credentials are ready.
    # Currently disabled so the workflow can be merged without secrets.
    if: ${{ vars.EAS_ENABLED == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build with EAS
        run: eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --non-interactive

      # Uncomment once production profile + store credentials are configured:
      # - name: Submit to stores
      #   run: eas submit --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --non-interactive
      #   if: ${{ inputs.profile == 'production' }}
