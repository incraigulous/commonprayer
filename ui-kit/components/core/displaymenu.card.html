<!-- @dsCard group="Components" viewport="700x560" name="Display menu" subtitle="DisplayMenu — Theme · Color (Seasonal / Time of Day / season) · Text size" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Display menu</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { padding: 28px; display: flex; gap: 28px; align-items: flex-start; }
  .stage { display: flex; gap: 28px; align-items: flex-start; }
  .lbl { font-family: var(--font-ui); font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--text-subtle); margin: 0 0 12px; }
  .readout { max-width: 300px; }
  .readout__title { font-family: var(--font-display); font-size: var(--text-xl); color: var(--accent); margin: 20px 0 4px; }
  .readout__sample { font-family: var(--font-serif); font-size: var(--reading-lg); line-height: 1.6; color: var(--text); margin: 0; }
  .readout__meta { font-family: var(--font-ui); font-size: var(--text-xs); color: var(--text-subtle); letter-spacing: .04em; margin: 16px 0 0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { DisplayMenu, timeOfDaySeason, timeOfDayOffice, DISPLAY_READING_SCALES } = window.CommonPrayerDesignSystem_91d70c;
  const CALENDAR_SEASON = 'ordinary'; // pretend "today" is Ordinary Time

  function Demo() {
    const [theme, setTheme] = React.useState('light');
    const [color, setColor] = React.useState('seasonal');
    const [size, setSize] = React.useState('md');

    const season = color === 'time' ? timeOfDaySeason() : color === 'seasonal' ? CALENDAR_SEASON : color;

    React.useEffect(() => {
      const html = document.documentElement;
      html.setAttribute('data-season', season);
      html.setAttribute('data-theme', theme === 'system' ? 'light' : theme);
      html.style.setProperty('--reading-scale', DISPLAY_READING_SCALES[size] ?? 1);
    }, [season, theme, size]);

    const hint = color === 'time'
      ? `Now · ${timeOfDayOffice().office}`
      : color === 'seasonal' ? 'Following the calendar' : null;

    return (
      <div className="stage">
        <DisplayMenu
          theme={theme} onThemeChange={setTheme}
          color={color} onColorChange={setColor}
          size={size} onSizeChange={setSize}
          colorHint={hint}
        />
        <div className="readout">
          <p className="lbl">Preview</p>
          <p className="readout__title">The Invitatory</p>
          <p className="readout__sample">O come, let us sing unto the Lord; let us heartily rejoice in the strength of our salvation.</p>
          <p className="readout__meta">theme {theme} · color {color} · season {season} · size {size}</p>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
