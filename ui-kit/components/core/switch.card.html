<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  body { padding: 30px; background: var(--surface-sunk); }
  .panel { max-width: 360px; display: flex; flex-direction: column; gap: 20px;
    background: var(--surface-raised); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 22px 24px; box-shadow: var(--shadow-md); }
  .panel > .row + .row { border-top: 1px solid var(--border); padding-top: 20px; }
</style>

<body>
<div id="root"></div>
<script type="text/babel">
  const { Switch } = window.CommonPrayerDesignSystem_91d70c;
  function Demo() {
    const [dark, setDark] = React.useState(true);
    const [remind, setRemind] = React.useState(false);
    return (
      <div className="panel">
        <div className="row">
          <Switch label="Night office" help="Dim the page for low light"
            checked={dark} onChange={setDark} onGlyph={'\u263E'} offGlyph={'\u2600'} />
        </div>
        <div className="row">
          <Switch label="Daily reminder" help="A bell at 8:00 each morning"
            checked={remind} onChange={setRemind} />
        </div>
        <div className="row">
          <Switch label="Sync across devices" checked={false} disabled />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
