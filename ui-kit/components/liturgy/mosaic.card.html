<!-- @dsCard group="Components" viewport="820x420" name="Mosaic" subtitle="Mosaic — shimmering vector stained-glass panel" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mosaic</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { padding: 26px; background: var(--surface-sunk); }
  .row { display: flex; gap: 18px; align-items: flex-start; flex-wrap: wrap; }
  .tile { width: 176px; }
  .tile__panel { height: 240px; border-radius: 14px; overflow: hidden; box-shadow: var(--shadow-md); background: #17120d; }
  .cap { font-family: var(--font-ui); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-subtle); text-align: center; margin: 10px 0 0; }
  .note { font-family: var(--font-serif); font-style: italic; color: var(--text-muted); font-size: 14px; margin: 0 0 20px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Mosaic } = window.CommonPrayerDesignSystem_91d70c;
  const PALETTES = {
    Easter:    ['#ecd79c', '#e2c887', '#d3ad5c', '#c9a24b', '#a9843a', '#8a6b2e', '#dcc079'],
    Ordinary:  ['#a9c19b', '#94ad87', '#7f9a72', '#5f7d53', '#4a6540', '#3c5334', '#8aa67d'],
    Pentecost: ['#f0b3a6', '#eca192', '#e27563', '#d65846', '#bf4835', '#9c3626', '#e9897a'],
    Lent:      ['#b3a7c9', '#9789b3', '#7d6f9c', '#675889', '#524570', '#3f3459', '#8b7daa'],
  };
  function Demo() {
    return (
      <div>
        <p className="note">Each pane shimmers on its own slow, staggered cycle — light shifting through old glass. The last panel is static (animate=false).</p>
        <div className="row">
          {Object.entries(PALETTES).map(([name, colors]) => (
            <div className="tile" key={name}>
              <div className="tile__panel"><Mosaic colors={colors} seed={name.length * 3} /></div>
              <p className="cap">{name}</p>
            </div>
          ))}
          <div className="tile">
            <div className="tile__panel"><Mosaic colors={PALETTES.Easter} animate={false} /></div>
            <p className="cap">Static</p>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
