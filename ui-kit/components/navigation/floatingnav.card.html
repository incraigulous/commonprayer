<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FloatingNav</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { padding: 30px; background: var(--surface-sunk); }
  .row { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }
  .glass-frame { width: 260px; height: 160px; border-radius: 12px; overflow: hidden; position: relative;
    background: linear-gradient(160deg, #1b2a44, #0a1220); display: flex; align-items: flex-end; padding: 16px; }
  .cap { font-family: var(--font-ui); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-subtle); text-align: center; margin: 10px 0 0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { FloatingNav } = window.CommonPrayerDesignSystem_91d70c;
  const ITEMS = [
    { id: 'home', label: 'Home', icon: 'home' },
    { id: 'office', label: 'Office', icon: 'book-open' },
    { id: 'psalter', label: 'Psalter', icon: 'book' },
    { id: 'more', label: 'More', icon: 'menu' },
  ];
  function Demo() {
    const [glassActive, setGlassActive] = React.useState('home');
    const [solidActive, setSolidActive] = React.useState('office');
    return (
      <div className="row">
        <div>
          <div className="glass-frame">
            <FloatingNav variant="glass" items={ITEMS} active={glassActive} onChange={setGlassActive} />
          </div>
          <p className="cap">Glass — over imagery</p>
        </div>
        <div>
          <div style={{ width: 260 }}>
            <FloatingNav variant="solid" items={ITEMS} active={solidActive} onChange={setSolidActive} />
          </div>
          <p className="cap">Solid — on a surface</p>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
