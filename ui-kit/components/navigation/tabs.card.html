<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tabs</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { padding: 28px; }
  .lbl { font-family:var(--font-ui); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--text-subtle); margin:0 0 12px; }
  .barwrap { max-width:460px; border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:26px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Tabs, Icon } = window.CommonPrayerDesignSystem_91d70c;
  function Demo() {
    const [office, setOffice] = React.useState('morning');
    const [sec, setSec] = React.useState('psalter');
    return (
      <div>
        <p className="lbl">Bottom office navigation</p>
        <div className="barwrap">
          <Tabs
            variant="bar"
            value={office}
            onChange={setOffice}
            items={[
              { id:'morning', label:'Morning', icon:<Icon name="sunrise" size="1em" /> },
              { id:'noon',    label:'Noon',    icon:<Icon name="sun" size="1em" /> },
              { id:'evening', label:'Evening', icon:<Icon name="moon" size="1em" /> },
              { id:'more',    label:'More',    icon:<Icon name="more-horizontal" size="1em" /> },
            ]}
          />
        </div>
        <p className="lbl">In-page section tabs</p>
        <Tabs
          value={sec}
          onChange={setSec}
          items={[
            { id:'psalter', label:'Psalter' },
            { id:'lessons', label:'The Lessons' },
            { id:'prayers', label:'Prayers' },
          ]}
        />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
