<!DOCTYPE html><html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{ margin:0; padding:20px 26px; display:flex; gap:24px; align-items:center; }
  .imgwrap{ width:160px; height:200px; flex:none; display:flex; align-items:center; justify-content:center; background:var(--surface-raised); border:1px solid var(--border); border-radius:var(--radius-md); padding:14px; }
  .imgwrap img{ max-width:100%; max-height:100%; filter:brightness(0) invert(1) opacity(.9); }
  .txt h3{ font-family:var(--font-display); font-size:24px; color:var(--text); margin:0 0 8px; }
  .txt p{ font-family:var(--font-serif); font-size:15px; line-height:1.55; color:var(--text-muted); margin:0 0 8px; max-width:38ch; }
  .txt .note{ font-family:var(--font-ui); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); }
</style></head>
<body>
  <div class="imgwrap"><img src="../assets/inspiration/sanctuary-tulsa-logo.webp" alt="Sanctuary Tulsa line-art mark" /></div>
  <div class="txt">
    <h3>Fine, ruled line-work</h3>
    <p>The look and feel draws on ecclesiastical line-art: arched forms, single-weight hairline strokes, and sacred iconography rendered in pure outline.</p>
    <p class="note">Reference only — belongs to Sanctuary Tulsa, not Common Prayer</p>
  </div>
</body></html>
