<!DOCTYPE html><html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{ margin:0; padding:22px 26px; max-width:60ch; }
  .rub{ font-family:var(--font-serif); font-style:italic; color:var(--accent); font-size:16px; line-height:1.5; margin:0 0 6px; }
  .say{ font-family:var(--font-serif); font-size:17px; line-height:1.6; color:var(--text); margin:0 0 14px; }
  .exp{ font-family:var(--font-ui); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--text-subtle); margin:0; }
</style></head>
<body>
  <p class="rub">The Officiant and People say together</p>
  <p class="say">Almighty and most merciful Father, we have erred and strayed from your ways like lost sheep.</p>
  <p class="exp">Rubric red = instruction &amp; response marks · Ink = the words we pray</p>
</body></html>
