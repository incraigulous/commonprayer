<!DOCTYPE html><html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{ margin:0; padding:0; height:100%; display:flex; align-items:center; justify-content:center; }
  .lockup{ text-align:center; }
  .cross{ font-family:var(--font-display); color:var(--gilt); font-size:20px; line-height:1; margin-bottom:6px; }
  .name{ font-family:var(--font-display); font-weight:600; font-size:46px; line-height:1; color:var(--text); letter-spacing:.01em; margin:0; }
  .rule{ width:46px; height:1.5px; background:var(--accent); margin:14px auto; }
  .via{ font-family:var(--font-ui); font-size:12px; letter-spacing:.4em; text-transform:uppercase; color:var(--text-muted); margin:0; padding-left:.4em; }
</style></head>
<body>
  <div class="lockup">
    <div class="cross">&#10015;</div>
    <p class="name">Common&nbsp;Prayer</p>
    <div class="rule"></div>
    <p class="via">Via Media</p>
  </div>
</body></html>
