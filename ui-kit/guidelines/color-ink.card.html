<!-- @dsCard group="Colors" viewport="700x150" name="Ink — the night ground" subtitle="Deep-navy neutrals the office is set upon" -->
<!DOCTYPE html><html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{ margin:0; padding:18px; }
  .row{ display:flex; gap:0; border:1px solid var(--border); border-radius:var(--radius-md); overflow:hidden; }
  .sw{ flex:1; height:96px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px 10px; }
  .n{ font-family:var(--font-ui); font-size:11px; letter-spacing:.04em; }
  .v{ font-family:var(--font-ui); font-size:10px; opacity:.7; }
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--ink-950)"><span class="n" style="color:#fff">950</span><span class="v" style="color:#fff">#04070f</span></div>
    <div class="sw" style="background:var(--ink-900)"><span class="n" style="color:#fff">900</span></div>
    <div class="sw" style="background:var(--ink-850)"><span class="n" style="color:#fff">850</span></div>
    <div class="sw" style="background:var(--ink-800)"><span class="n" style="color:#fff">800</span></div>
    <div class="sw" style="background:var(--ink-700)"><span class="n" style="color:#fff">700</span></div>
    <div class="sw" style="background:var(--ink-600)"><span class="n" style="color:#fff">600</span></div>
    <div class="sw" style="background:var(--ink-400)"><span class="n" style="color:#04070f">400</span></div>
    <div class="sw" style="background:var(--ink-200)"><span class="n" style="color:#04070f">200</span></div>
  </div>
</body></html>
