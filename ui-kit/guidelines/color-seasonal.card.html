<!-- @dsCard group="Colors" viewport="700x130" name="Seasonal marks" subtitle="Green ordinary time · violet Advent & Lent" -->
<!DOCTYPE html><html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{ margin:0; padding:18px; display:flex; gap:16px; align-items:center; }
  .chip{ display:flex; align-items:center; gap:10px; border:1px solid var(--border); border-radius:var(--radius-pill); padding:8px 16px; }
  .dot{ width:20px; height:20px; border-radius:50%; }
  .lab{ font-family:var(--font-ui); font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--text-muted); }
</style></head>
<body>
  <div class="chip"><span class="dot" style="background:var(--sage-500)"></span><span class="lab">Sage · Ordinary Time</span></div>
  <div class="chip"><span class="dot" style="background:var(--violet-500)"></span><span class="lab">Violet · Advent &amp; Lent</span></div>
  <div class="chip"><span class="dot" style="background:var(--gilt)"></span><span class="lab">Gilt · Feasts</span></div>
</body></html>
