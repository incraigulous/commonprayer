<!DOCTYPE html><html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{ margin:0; padding:18px; }
  .grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .tile{ height:110px; border-radius:var(--radius-md); border:1px solid var(--border); padding:10px; display:flex; flex-direction:column; justify-content:space-between; }
  .k{ font-family:var(--font-ui); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--text-muted); }
  .demo{ font-family:var(--font-display); font-size:22px; }
</style></head>
<body>
  <div class="grid">
    <div class="tile" style="background:var(--bg)"><span class="k">--bg</span><span class="demo" style="color:var(--text)">Aa</span></div>
    <div class="tile" style="background:var(--surface)"><span class="k">--surface</span><span class="demo" style="color:var(--text)">Aa</span></div>
    <div class="tile" style="background:var(--surface-raised)"><span class="k">--surface-raised</span><span class="demo" style="color:var(--text)">Aa</span></div>
    <div class="tile" style="background:var(--surface-raised)"><span class="k">--accent</span><span class="demo" style="color:var(--accent)">Aa</span></div>
  </div>
</body></html>
