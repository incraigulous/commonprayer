<!-- @dsCard group="Spacing" viewport="700x210" name="Reading measure" subtitle="~36rem column keeps liturgy legible" -->
<!DOCTYPE html><html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{ margin:0; padding:20px 26px; }
  .frame{ border-left:1.5px solid var(--accent); border-right:1px dashed var(--border); padding:0 16px; max-width:36rem; }
  p{ font-family:var(--font-serif); font-size:16px; line-height:1.68; color:var(--text); margin:0; }
  .cap{ font-family:var(--font-ui); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--text-subtle); margin:0 0 10px; }
</style></head>
<body>
  <p class="cap">--measure · 36rem · ≈ 66 characters</p>
  <div class="frame">
    <p>Blessed are all who fear the Lord, and who follow in his ways. You shall eat the fruit of your labor; happiness and prosperity shall be yours. The line length is held near sixty-six characters so the eye returns cleanly to the next line.</p>
  </div>
</body></html>
