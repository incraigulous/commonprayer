<!-- @dsCard group="Spacing" viewport="700x180" name="Space scale" subtitle="4px base · calm vertical rhythm" -->
<!DOCTYPE html><html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{ margin:0; padding:22px 26px; display:flex; align-items:flex-end; gap:14px; }
  .col{ display:flex; flex-direction:column; align-items:center; gap:8px; }
  .bar{ width:26px; background:var(--accent); border-radius:2px 2px 0 0; }
  .t{ font-family:var(--font-ui); font-size:10px; color:var(--text-muted); }
</style></head>
<body>
  <div class="col"><div class="bar" style="height:4px"></div><span class="t">1·4</span></div>
  <div class="col"><div class="bar" style="height:8px"></div><span class="t">2·8</span></div>
  <div class="col"><div class="bar" style="height:12px"></div><span class="t">3·12</span></div>
  <div class="col"><div class="bar" style="height:16px"></div><span class="t">4·16</span></div>
  <div class="col"><div class="bar" style="height:24px"></div><span class="t">5·24</span></div>
  <div class="col"><div class="bar" style="height:32px"></div><span class="t">6·32</span></div>
  <div class="col"><div class="bar" style="height:40px"></div><span class="t">7·40</span></div>
  <div class="col"><div class="bar" style="height:48px"></div><span class="t">8·48</span></div>
  <div class="col"><div class="bar" style="height:64px"></div><span class="t">9·64</span></div>
  <div class="col"><div class="bar" style="height:80px"></div><span class="t">10·80</span></div>
</body></html>
