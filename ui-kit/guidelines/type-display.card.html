<!-- @dsCard group="Type" viewport="700x210" name="Display — Cormorant Garamond" subtitle="Titles, dates & illuminated initials" -->
<!DOCTYPE html><html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{ margin:0; padding:22px 26px; }
  .d1{ font-family:var(--font-display); font-weight:600; font-size:52px; line-height:1.05; margin:0; color:var(--text); }
  .d2{ font-family:var(--font-display); font-weight:400; font-size:34px; line-height:1.1; margin:10px 0 0; color:var(--text-muted); }
  .meta{ font-family:var(--font-ui); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--text-subtle); margin:16px 0 0; }
</style></head>
<body>
  <p class="d1">Morning Prayer</p>
  <p class="d2">The Sixth Sunday after Pentecost</p>
  <p class="meta">Cormorant Garamond · 600 / 400 · high-contrast old-style serif</p>
</body></html>
