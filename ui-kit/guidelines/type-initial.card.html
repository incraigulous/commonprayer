<!-- @dsCard group="Type" viewport="700x230" name="Illuminated initial" subtitle="The gilt drop-cap that opens a psalm" -->
<!DOCTYPE html><html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{ margin:0; padding:24px 26px; }
  .para{ font-family:var(--font-serif); font-size:17px; line-height:1.68; color:var(--text); margin:0; max-width:48ch; }
  .cap{ font-family:var(--font-initial); float:left; line-height:.72; color:var(--gilt); font-size:3.4em; margin:.04em .12em 0 0; }
  .boxed{ font-family:var(--font-initial); float:left; display:flex; align-items:center; justify-content:center; width:1.5em; height:1.5em; margin:.06em .35em .1em 0; font-size:2.5em; line-height:1; border:2px solid var(--gilt); border-radius:2px; box-shadow:inset 0 0 0 1px var(--gilt-quiet); background:var(--gilt-quiet); color:var(--gilt); }
  .clear{ clear:both; }
  .meta{ font-family:var(--font-ui); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--text-subtle); margin:14px 0 0; }
</style></head>
<body>
  <p class="para"><span class="boxed">C</span>ome, let us sing unto the Lord; let us heartily rejoice in the strength of our salvation. Let us come before his presence with thanksgiving.</p>
  <div class="clear"></div>
  <p class="meta">Goudy Initialen · gilt · boxed & floated variants</p>
</body></html>
