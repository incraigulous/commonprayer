<!-- @dsCard group="Type" viewport="700x150" name="Small-caps labels" subtitle="UI chrome, metadata & rubric heads" -->
<!DOCTYPE html><html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{ margin:0; padding:22px 26px; display:flex; flex-direction:column; gap:14px; }
  .lab{ font-family:var(--font-ui); font-size:12px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; }
  .m{ color:var(--text-muted); } .r{ color:var(--accent); } .g{ color:var(--gold-300); }
  .row{ display:flex; gap:26px; align-items:center; }
  .note{ font-family:var(--font-ui); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--text-subtle); }
</style></head>
<body>
  <div class="row"><span class="lab m">Morning · Noon · Evening</span><span class="lab r">The First Lesson</span><span class="lab g">Feast Day</span></div>
  <p class="note">UI sans · 600 · tracking 0.16em — the only sans in the system</p>
</body></html>
