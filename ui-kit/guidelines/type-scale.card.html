<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="From caption to hero display" -->
<!DOCTYPE html><html><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{ margin:0; padding:20px 26px; }
  .row{ display:flex; align-items:baseline; gap:16px; border-bottom:1px solid var(--hairline); padding:7px 0; }
  .row:last-child{ border-bottom:0; }
  .tok{ font-family:var(--font-ui); font-size:10px; letter-spacing:.1em; color:var(--text-subtle); width:118px; flex:none; text-transform:uppercase; }
  .spec{ font-family:var(--font-display); color:var(--text); line-height:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
</style></head>
<body>
  <div class="row"><span class="tok">--text-5xl · 72</span><span class="spec" style="font-size:44px">Kyrie</span></div>
  <div class="row"><span class="tok">--text-3xl · 40</span><span class="spec" style="font-size:34px">July 5, 2026</span></div>
  <div class="row"><span class="tok">--text-2xl · 30</span><span class="spec" style="font-size:26px">Morning Prayer</span></div>
  <div class="row"><span class="tok">--text-xl · 24</span><span class="spec" style="font-size:22px">Confession of Sin</span></div>
  <div class="row"><span class="tok">--text-lg · 20</span><span class="spec" style="font-size:18px;font-family:var(--font-serif)">Let us pray.</span></div>
  <div class="row"><span class="tok">--text-base · 17</span><span class="spec" style="font-size:16px;font-family:var(--font-serif)">Lord, have mercy upon us.</span></div>
  <div class="row"><span class="tok">--text-sm · 15</span><span class="spec" style="font-size:14px;font-family:var(--font-serif);color:var(--text-muted)">The Sixth Sunday after Pentecost</span></div>
</body></html>
