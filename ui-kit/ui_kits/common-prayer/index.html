<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Common Prayer — Daily Office</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { height: 100%; }
  body { margin: 0; background: #05070d; display: flex; align-items: center; justify-content: center; }

  /* Phone frame */
  .cp-app {
    width: 420px; height: 812px; max-height: 100vh;
    display: flex; flex-direction: column;
    background: var(--bg); color: var(--text);
    overflow: hidden; position: relative;
    box-shadow: 0 30px 80px rgba(0,0,0,.6);
  }

  /* Top bar */
  .cp-app__bar {
    flex: none; display: grid; grid-template-columns: 40px 1fr 40px; align-items: center;
    padding: 14px 14px; background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .cp-app__icon { appearance: none; background: none; border: 0; color: var(--text-muted); display: flex; justify-content: center; cursor: pointer; padding: 4px; }
  .cp-app__icon:hover { color: var(--text); }
  .cp-app__title { font-family: var(--font-display); font-weight: 600; font-size: 20px; text-align: center; margin: 0; color: var(--text); }

  /* Scroll region */
  .cp-app__scroll { flex: 1; overflow-y: auto; padding: 22px 26px 40px; }
  .cp-app__scroll::-webkit-scrollbar { width: 8px; }
  .cp-app__scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }

  /* Bottom nav */
  .cp-app__nav { flex: none; }

  /* Office */
  .cp-office__masthead { text-align: center; }
  .cp-office__date { font-family: var(--font-display); font-weight: 600; font-size: 32px; margin: 4px 0 4px; color: var(--text); }
  .cp-office__season { font-family: var(--font-serif); font-style: italic; font-size: 16px; color: var(--text-muted); margin: 0 0 12px; }
  .cp-office__tags { display: flex; gap: 8px; justify-content: center; }
  .cp-office__say { font-family: var(--font-serif); font-size: 17px; line-height: 1.68; color: var(--text); margin: 0 0 8px; }
  .cp-office__ref { font-family: var(--font-ui); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); }
  .cp-office__amen { display: flex; justify-content: center; margin-top: 8px; }

  /* More screen */
  .cp-more { display: flex; flex-direction: column; gap: 18px; }
  .cp-toggle { display: flex; align-items: center; justify-content: space-between; }
  .cp-toggle__opt { display: flex; align-items: center; gap: 10px; font-family: var(--font-serif); font-size: 16px; color: var(--text); }
  .cp-seg { display: inline-flex; border: 1px solid var(--border-strong); border-radius: var(--radius-pill); overflow: hidden; }
  .cp-seg button { appearance: none; border: 0; background: transparent; color: var(--text-muted); font-family: var(--font-ui); font-size: 12px; letter-spacing: .08em; text-transform: uppercase; padding: 7px 14px; cursor: pointer; }
  .cp-seg button.is-on { background: var(--accent); color: var(--text-on-accent); }

  .cp-list { display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .cp-list__row { appearance: none; background: var(--surface-raised); border: 0; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; text-align: left; color: var(--text); }
  .cp-list__row:last-child { border-bottom: 0; }
  .cp-list__row:hover { background: var(--surface-hover); }
  .cp-list__lead { color: var(--text-muted); display: flex; }
  .cp-list__label { flex: 1; font-family: var(--font-serif); font-size: 16px; }
  .cp-list__meta { font-family: var(--font-ui); font-size: 12px; color: var(--text-subtle); letter-spacing: .04em; }
  .cp-list__row > .cp-icon:last-child { color: var(--text-subtle); }
</style>
</head>
<body>
<div id="root"></div>
<script src="./data.js"></script>
<script type="text/babel" src="./screens.jsx"></script>
<script type="text/babel" src="./App.jsx"></script>
</body>
</html>
