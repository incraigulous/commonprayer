<!-- @dsCard group="Common Prayer" viewport="420x900" name="Prayer Book by Via Media" subtitle="The Daily Office · Morning · Noon · Evening · Compline" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Prayer Book · Via Media</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { height: 100%; }
  body { margin: 0; background: #05070d; display: flex; align-items: center; justify-content: center; font-family: var(--font-ui); }

  /* ---- Phone frame -------------------------------------------------------- */
  .cp-app {
    width: 420px; height: 900px; max-height: 100vh;
    display: flex; flex-direction: column;
    background: var(--bg); color: var(--text);
    overflow: hidden; position: relative;
    box-shadow: 0 40px 100px rgba(0,0,0,.65);
  }

  /* No gold inside the office: gilt maps to the season accent (Christmas &
     Easter exempt — their season colour already IS gold). */
  :where([data-season]:not([data-season="christmas"]):not([data-season="easter"])) .cp-app {
    --gold-300: var(--accent); --gold-400: var(--accent);
    --gold-500: var(--accent); --gold-600: var(--accent);
    --gilt: var(--accent); --gilt-quiet: var(--accent-quiet);
  }

  .cp-scene { position: absolute; inset: 0; display: flex; flex-direction: column; }

  /* ======================================================================== */
  /* HOME — time of day                                                        */
  /* ======================================================================== */
  .cp-home { position: absolute; inset: 0; overflow: hidden; }
  .cp-home__bg { position: absolute; inset: 0; background-size: cover; background-position: center; transform: scale(1.05); transition: opacity .6s ease; }
  .cp-home__scrim { position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(8,10,20,.55) 0%, rgba(8,10,20,.12) 30%, rgba(8,10,20,.35) 68%, rgba(8,10,20,.78) 100%); }
  .cp-home__inner { position: absolute; inset: 0; display: flex; flex-direction: column; padding: 20px 18px 22px; }

  /* period switch */
  .cp-period { display: flex; gap: 4px; padding: 5px; border-radius: var(--radius-pill);
    background: rgba(255,255,255,.92); border: 2.5px solid var(--period-accent);
    box-shadow: 0 8px 30px rgba(0,0,0,.28); }
  .cp-period button { flex: 1; min-width: 0; display: flex; align-items: center; justify-content: center; gap: 6px;
    appearance: none; border: 0; background: transparent; cursor: pointer; white-space: nowrap;
    padding: 11px 6px; border-radius: var(--radius-pill);
    font-family: var(--font-ui); font-weight: 700; font-size: 13.5px; color: #1a2233;
    transition: background .25s ease, color .25s ease; }
  .cp-period button .dot { width: 9px; height: 9px; flex: none; border-radius: 50%; display: inline-block; }
  .cp-period button.is-on { background: var(--period-accent); color: var(--period-on); }
  .cp-period button.is-on .dot { background: var(--period-on); }

  .cp-home__center { flex: 1; display: flex; align-items: center; justify-content: center; }

  /* arch start card (chapel window) */
  .cp-arch { width: 300px; padding: 46px 30px 36px; text-align: center; color: #fff;
    background: rgba(12,16,28,.40); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,.22);
    border-radius: 150px 150px 36px 36px;
    box-shadow: 0 24px 70px rgba(0,0,0,.45); }
  .cp-arch__date { font-family: var(--font-ui); font-size: 12px; letter-spacing: .22em; text-transform: uppercase; opacity: .82; margin: 0 0 16px; }
  .cp-arch__title { font-family: var(--font-display); font-weight: 600; font-size: 34px; line-height: 1.06; margin: 0; letter-spacing: -.01em; }
  .cp-arch__series { font-family: var(--font-serif); font-style: italic; font-size: 15px; opacity: .86; margin: 18px 0 26px; line-height: 1.4; }
  .cp-arch__start { appearance: none; border: 0; cursor: pointer;
    font-family: var(--font-ui); font-weight: 700; letter-spacing: .14em; text-transform: uppercase; font-size: 14px;
    color: var(--period-on); background: var(--period-accent);
    padding: 16px 44px; border-radius: var(--radius-pill);
    box-shadow: 0 10px 30px rgba(0,0,0,.35); transition: transform .15s ease, filter .15s ease; }
  .cp-arch__start:hover { filter: brightness(1.06); transform: translateY(-1px); }
  .cp-arch__start:active { transform: translateY(0); }

  /* ======================================================================== */
  /* FLOATING NAV                                                              */
  /* ======================================================================== */
  .cp-fnav { display: flex; gap: 2px; border-radius: var(--radius-pill); padding: 8px 10px; }
  .cp-fnav--glass { background: rgba(14,18,32,.42); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,.14); }
  .cp-fnav--solid { background: var(--surface-raised); border: 1px solid var(--border); box-shadow: var(--shadow-md); margin: 0 18px 18px; }
  .cp-fnav button { flex: 1; appearance: none; border: 0; background: transparent; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 4px;
    font-family: var(--font-ui); font-size: 11px; letter-spacing: .03em; }
  .cp-fnav--glass button { color: rgba(255,255,255,.66); }
  .cp-fnav--glass button.is-on { color: #fff; }
  .cp-fnav--solid button { color: var(--text-subtle); }
  .cp-fnav--solid button.is-on { color: var(--accent); }

  /* ======================================================================== */
  /* FLOATING ACTION MENU                                                      */
  /* ======================================================================== */
  .cp-fab { position: absolute; right: 20px; bottom: 26px; z-index: 7; display: flex; flex-direction: column-reverse; align-items: center; gap: 12px; }
  .cp-fab__main { width: 56px; height: 56px; border-radius: 50%; border: 0; cursor: pointer;
    background: var(--period-accent, var(--accent)); color: var(--period-on, var(--text-on-accent));
    display: flex; align-items: center; justify-content: center; box-shadow: 0 12px 30px rgba(0,0,0,.4);
    transition: transform .25s ease; }
  .cp-fab.is-open .cp-fab__main { transform: rotate(45deg); }
  .cp-fab__item { width: 46px; height: 46px; border-radius: 50%; border: 0; cursor: pointer;
    background: rgba(255,255,255,.95); color: #22303f; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 22px rgba(0,0,0,.32);
    opacity: 0; transform: translateY(14px) scale(.7); pointer-events: none;
    transition: opacity .22s ease, transform .22s ease; }
  .cp-fab.is-open .cp-fab__item { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
  .cp-fab.is-open .cp-fab__item:nth-child(3) { transition-delay: .02s; }
  .cp-fab.is-open .cp-fab__item:nth-child(2) { transition-delay: .06s; }
  .cp-fab.is-open .cp-fab__item:nth-child(1) { transition-delay: .10s; }

  /* ======================================================================== */
  /* SESSION (the office)                                                      */
  /* ======================================================================== */
  .cp-session { position: absolute; inset: 0; display: flex; flex-direction: column; background: var(--bg); }

  .cp-shead { flex: none; background: var(--bg); border-bottom: 1px solid var(--hairline); z-index: 5; }
  .cp-shead__top { display: flex; align-items: center; justify-content: flex-end; gap: 6px; padding: 14px 16px 6px; }
  .cp-shead__ico { appearance: none; background: none; border: 0; cursor: pointer; color: var(--text); display: flex; padding: 6px; border-radius: 10px; }
  .cp-shead__ico:hover { background: var(--surface-hover); }
  .cp-aa { display: flex; align-items: baseline; gap: 1px; color: var(--accent); font-family: var(--font-serif); }
  .cp-aa .s { font-size: 15px; } .cp-aa .l { font-size: 22px; font-weight: 600; }

  .cp-steps { display: flex; gap: 22px; overflow-x: auto; padding: 2px 40px 0 16px; scrollbar-width: none; }
  .cp-steps::-webkit-scrollbar { display: none; }
  .cp-steps button { appearance: none; background: none; border: 0; cursor: pointer; white-space: nowrap;
    font-family: var(--font-ui); font-size: 15px; font-weight: 600; color: var(--text-subtle);
    padding: 10px 0 12px; border-bottom: 2.5px solid transparent; transition: color .2s ease; }
  .cp-steps button.is-on { color: var(--accent); border-bottom-color: var(--accent); }

  /* one continuous page (tabs scroll to sections) */
  .cp-page { flex: 1; overflow-y: auto; }
  .cp-page::-webkit-scrollbar { width: 8px; }
  .cp-page::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }

  /* masthead — solid colour of the day, mosaic fades up under the text */
  .cp-mast { position: relative; min-height: 100%; box-sizing: border-box; display: flex; flex-direction: column; text-align: center; overflow: hidden; }
  .cp-mast__body { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 40px 26px 48px; position: relative; z-index: 1; }
  .cp-mast__date { font-family: var(--font-ui); font-size: 12px; font-weight: 600; letter-spacing: .22em; text-transform: uppercase; color: inherit; opacity: .82; margin: 0 0 16px; }
  .cp-mast__title { font-family: var(--font-display); font-weight: 600; font-size: 46px; line-height: 1.06; letter-spacing: -.015em; color: inherit; margin: 0; }
  .cp-mast__opening { font-family: var(--font-serif); font-style: italic; font-size: 22px; line-height: 1.4; color: inherit; margin: 24px 0 0; text-wrap: balance; }
  .cp-mast__opening span { display: block; }
  .cp-mast__opening span + span { opacity: .82; }
  .cp-mast__readings { font-family: var(--font-ui); font-size: 12px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: inherit; opacity: .72; margin: 22px 0 0; }

  /* mosaic shimmer (inline fallback; the Mosaic component ships its own copy) */
  .cp-mosaic polygon { transform-box: fill-box; }
  .cp-mosaic--anim polygon { animation-name: cp-mosaic-shimmer; animation-iteration-count: infinite; animation-timing-function: ease-in-out; animation-direction: alternate; will-change: opacity; }
  @keyframes cp-mosaic-shimmer { from { opacity: 1; } to { opacity: .28; } }
  @media (prefers-reduced-motion: reduce) { .cp-mosaic--anim polygon { animation: none !important; } }

  /* vector stained-glass mosaic — anchored at foot, fading up into the colour block under the text */
  .cp-mosaic { display: block; position: absolute; left: 0; right: 0; bottom: 0; width: 100%; height: 46%; min-height: 200px; z-index: 0;
    -webkit-mask-image: linear-gradient(180deg, transparent 0%, rgba(0,0,0,.35) 40%, rgba(0,0,0,.8) 66%, #000 100%);
    mask-image: linear-gradient(180deg, transparent 0%, rgba(0,0,0,.35) 40%, rgba(0,0,0,.8) 66%, #000 100%); }

  /* masthead wrapper — fixes the office masthead to a compact height (component fills it) */
  .cp-mastwrap { height: 340px; }

  /* one-page sections */
  .cp-sec { padding: 0 26px; }
  .cp-sec:first-of-type { padding-top: 22px; }
  .cp-lead { margin: 0 0 6px; }
  .cp-lead .rb-versicle { gap: 4px; }
  .cp-sec__label { font-family: var(--font-ui); font-size: 12px; font-weight: 600; letter-spacing: .18em; text-transform: uppercase; color: var(--accent); margin: 30px 0 14px; padding-top: 22px; border-top: 1px solid var(--hairline); }
  .cp-sec:first-of-type .cp-sec__label { margin-top: 0; padding-top: 0; border-top: 0; }

  /* reading blocks */
  .rb + .rb { margin-top: 22px; }
  .rb-heading { font-family: var(--font-display); font-weight: 600; font-size: 27px; line-height: 1.15; color: var(--text); margin: 34px 0 4px; letter-spacing: -.01em; }
  .rb-rubric { font-family: var(--font-serif); font-style: italic; font-size: var(--reading-sm); line-height: 1.5; color: var(--accent); margin: 0; }
  .rb-prose { font-family: var(--font-serif); font-size: var(--reading-base); line-height: 1.66; color: var(--text); margin: 0; }
  .rb-scripture { font-family: var(--font-serif); font-size: var(--reading-lg); line-height: 1.5; color: var(--text); margin: 0; }
  .rb-scripture--hl { position: relative; background: var(--accent); color: var(--text-on-accent); padding: 26px 24px 40px; border-radius: 22px; }
  .rb-scripture--hl::after { content: "\2720"; position: absolute; bottom: 16px; right: 20px; font-size: 18px; line-height: 1; color: color-mix(in srgb, var(--text-on-accent) 72%, transparent); }
  .rb-psalm { font-family: var(--font-serif); font-size: var(--reading-base); line-height: 1.6; color: var(--text); margin: 0; background: var(--surface-sunk); border-left: 3px solid var(--accent); border-radius: 0 14px 14px 0; padding: 18px 22px; }
  .rb-psalm__ref { display: block; font-family: var(--font-ui); font-size: 12px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
  .rb-psalm__text { display: block; white-space: pre-line; }
  .rb-canticle { font-family: var(--font-serif); font-size: var(--reading-base); line-height: 1.6; color: var(--text); margin: 0; white-space: pre-line; padding-left: 18px; border-left: 2px solid var(--accent-quiet); font-style: italic; }
  .rb-ref { display: block; font-family: var(--font-ui); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--text-subtle); margin-top: 14px; }
  .rb-scripture--hl .rb-ref { color: color-mix(in srgb, var(--text-on-accent) 82%, transparent); }
  .rb-collect { font-family: var(--font-serif); font-size: var(--reading-base); line-height: 1.62; color: var(--text); margin: 0; padding: 22px 22px; background: var(--accent-quiet); border-radius: 18px; }
  .rb-refrain { font-family: var(--font-serif); font-style: italic; font-size: var(--reading-base); line-height: 1.55; color: var(--text-muted); text-align: center; margin: 0; }
  .rb-opening { margin: 0; }
  .rb-opening .rb-ref { margin-top: 18px; }
  .rb-refrain .rb-ref { text-align: center; }
  .rb-versicle { display: flex; flex-direction: column; gap: 6px; }
  .rb-vline { font-family: var(--font-serif); font-size: var(--reading-base); line-height: 1.4; }
  .rb-vline .who { font-family: var(--font-ui); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--text-subtle); display: block; margin-bottom: 1px; }
  .rb-vline--resp { color: var(--accent); font-weight: 500; }

  /* end-of-office */
  .cp-amen { text-align: center; padding: 40px 0 8px; }
  .cp-amen__btn { appearance: none; border: 0; cursor: pointer; font-family: var(--font-ui); font-weight: 700; letter-spacing: .14em; text-transform: uppercase; font-size: 14px; color: var(--text-on-accent); background: var(--accent); padding: 16px 52px; border-radius: var(--radius-pill); box-shadow: var(--shadow-md); }

  /* ======================================================================== */
  /* MORE + PSALTER  (kept, lightly modernized)                               */
  /* ======================================================================== */
  .cp-inner { position: absolute; inset: 0; display: flex; flex-direction: column; background: var(--bg); }
  .cp-inner__head { flex: none; display: flex; align-items: center; gap: 10px; padding: 20px 22px 12px; }
  .cp-inner__back { appearance: none; background: none; border: 0; cursor: pointer; color: var(--text); display: flex; padding: 6px; border-radius: 10px; }
  .cp-inner__back:hover { background: var(--surface-hover); }
  .cp-inner__title { font-family: var(--font-display); font-weight: 600; font-size: 30px; margin: 0; color: var(--text); }
  .cp-inner__scroll { flex: 1; overflow-y: auto; padding: 6px 22px 24px; }
  .cp-inner__scroll::-webkit-scrollbar { width: 8px; }
  .cp-inner__scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }

  .cp-more { display: flex; flex-direction: column; gap: 18px; }
  .cp-toggle { display: flex; align-items: center; justify-content: space-between; }
  .cp-toggle__opt { display: flex; align-items: center; gap: 10px; font-family: var(--font-serif); font-size: 16px; color: var(--text); }
  .cp-seg { display: inline-flex; border: 1px solid var(--border-strong); border-radius: var(--radius-pill); overflow: hidden; }
  .cp-seg button { appearance: none; border: 0; background: transparent; color: var(--text-muted); font-family: var(--font-ui); font-size: 12px; letter-spacing: .08em; text-transform: uppercase; padding: 7px 14px; cursor: pointer; }
  .cp-seg button.is-on { background: var(--accent); color: var(--text-on-accent); }

  .cp-list { display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .cp-list__row { appearance: none; background: var(--surface-raised); border: 0; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; text-align: left; color: var(--text); }
  .cp-list__row:last-child { border-bottom: 0; }
  .cp-list__row:hover { background: var(--surface-hover); }
  .cp-list__lead { color: var(--text-muted); display: flex; }
  .cp-list__label { flex: 1; font-family: var(--font-serif); font-size: 16px; }
  .cp-list__meta { font-family: var(--font-ui); font-size: 12px; color: var(--text-subtle); letter-spacing: .04em; }

  .cp-psalter { display: flex; flex-direction: column; }
  .cp-psalter__lede { font-family: var(--font-serif); font-size: 16px; color: var(--text-muted); line-height: 1.5; margin: 0; }
  .cp-psearch { position: relative; margin-top: 18px; }
  .cp-psearch__ico { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-subtle); display: flex; pointer-events: none; }
  .cp-psearch__input { width: 100%; box-sizing: border-box; font-family: var(--font-serif); font-size: 16px; color: var(--text); background: var(--surface-sunk); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px 40px; }
  .cp-psearch__input::placeholder { color: var(--text-subtle); font-style: italic; }
  .cp-psearch__input:focus { outline: none; border-color: var(--accent); box-shadow: var(--focus-ring); }
  .cp-psearch__clear { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); appearance: none; background: none; border: 0; color: var(--text-subtle); display: flex; padding: 6px; cursor: pointer; border-radius: 50%; }
  .cp-appointed { margin-top: 22px; }
  .cp-appointed__lbl { display: flex; align-items: center; gap: 8px; font-family: var(--font-ui); font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--text-subtle); margin: 0 0 10px; }
  .cp-appointed__lbl .sw { width: 12px; height: 12px; border-radius: 3px; background: var(--accent); }
  .cp-appointed__chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .cp-chip { display: inline-flex; align-items: baseline; gap: 7px; padding: 7px 13px; border-radius: var(--radius-pill); background: var(--accent-quiet); border: 1px solid color-mix(in srgb, var(--accent) 32%, transparent); cursor: pointer; }
  .cp-chip__n { font-family: var(--font-display); font-weight: 600; font-size: 14px; color: var(--accent); }
  .cp-chip__name { font-family: var(--font-serif); font-style: italic; font-size: 13px; color: var(--text-muted); }
  .cp-book { margin-top: 30px; }
  .cp-book__head { display: flex; align-items: baseline; gap: 12px; padding-bottom: 10px; margin-bottom: 12px; border-bottom: 1px solid var(--border); }
  .cp-book__name { font-family: var(--font-ui); font-size: 12px; letter-spacing: .18em; text-transform: uppercase; color: var(--accent); margin: 0; }
  .cp-book__range { font-family: var(--font-ui); font-size: 12px; letter-spacing: .04em; color: var(--text-subtle); margin: 0; }
  .cp-book__grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
  .cp-psalm { position: relative; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; appearance: none; border: 0; background: none; cursor: pointer; border-radius: var(--radius-md); font-family: var(--font-display); font-size: 17px; color: var(--text); }
  .cp-psalm:hover { background: var(--accent-quiet); color: var(--accent); }
  .cp-psalm--today { background: var(--accent); color: var(--text-on-accent); font-weight: 600; }
  .cp-psalter__empty { font-family: var(--font-serif); font-style: italic; color: var(--text-subtle); margin-top: 28px; }

  /* text-size popover (shared) */
  .cp-typepop__scrim { position: fixed; inset: 0; z-index: 30; }
  .cp-menupop { position: absolute; top: 52px; right: 12px; z-index: 40; }
  .cp-more__display { display: flex; justify-content: center; }
  .cp-more__display .cp-display { width: 100%; max-width: 360px; }
  .cp-typepop { position: absolute; top: 52px; right: 14px; z-index: 40; width: 250px; padding: 16px;
    background: var(--surface-raised); color: var(--text); border: 1px solid var(--border);
    border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); }
  .cp-typepop__lbl { font-family: var(--font-ui); font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--text-subtle); margin: 0 0 12px; }
  .cp-typepop__sample { font-family: var(--font-serif); font-size: var(--reading-lg); line-height: 1.5; color: var(--text); margin: 14px 0 0; }

  /* ---- boot bridge (instant white paint before React mounts) ------------- */
  #cp-boot { position: fixed; inset: 0; z-index: 9998; background: #ffffff; transition: opacity .4s ease; }
  #cp-boot.is-hidden { opacity: 0; pointer-events: none; }
  /* SplashScreen React overlay */
  .cp-splash-overlay { position: absolute; inset: 0; z-index: 60; animation: cp-splash-out .5s ease forwards; animation-delay: 1.1s; }
  @keyframes cp-splash-out { to { opacity: 0; visibility: hidden; } }
  @media (prefers-reduced-motion: reduce) { .cp-splash-overlay { animation-delay: 1.4s; } }
</style>
</head>
<body>
<div id="cp-boot"></div>
<div id="root"></div>
<script src="./data.js"></script>
<script type="text/babel" src="./screens.jsx"></script>
<script type="text/babel" src="./App.jsx"></script>
</body>
</html>
